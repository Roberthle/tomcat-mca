services:
  - type: web
    name: tomcat-mca-api
    env: python
    plan: free
    buildCommand: pip install -r portal/requirements.txt
    startCommand: cd portal && gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.9.6"
      - key: STRIPE_SECRET_KEY
        sync: false
